version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skypath-backend
    ports:
      - "8080:8080"
    volumes:
      - ./flights.json:/data/flights.json:ro
    environment:
      - JAVA_OPTS=-Xms128m -Xmx256m -Dskypath.flights.data-path=/data/flights.json
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/flights/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skypath-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

networks:
  default:
    name: skypath-network
