<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="theme-color" content="#0f172a" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>

        theme: {
          extend: {

          }
        }

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
      body { font-family: 'Sora', sans-serif; }

  <body class="bg-sky-dark text-white">
